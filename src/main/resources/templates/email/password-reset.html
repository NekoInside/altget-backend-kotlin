<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>密码重置请求 - 凌清阁</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; background-color: #f9f9f9;">
        <div style="background-color: #ffffff; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <!-- Title -->
            <h2 style="color: #4a5568; margin-top: 0;">密码重置请求</h2>
            
            <!-- Greeting -->
            <p>尊敬的用户 <strong th:text="${username}">用户名</strong>，</p>
            
            <!-- Description -->
            <p>我们收到了您重置账户密码的请求。如果这是您本人的操作，请点击下方按钮重置密码：</p>
            
            <!-- Action Button -->
            <div style="text-align: center; margin: 30px 0;">
                <a th:href="${resetUrl}" 
                   style="display: inline-block; padding: 12px 30px; background-color: #e53e3e; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: bold;"
                   aria-label="点击重置您的密码">
                    重置密码
                </a>
            </div>
            
            <!-- Fallback Link -->
            <p style="color: #718096; font-size: 14px;">
                如果按钮无法点击，请复制以下链接到浏览器地址栏：<br>
                <span style="background-color: #f7fafc; padding: 5px; display: inline-block; margin-top: 5px; word-break: break-all; font-family: monospace; font-size: 14px;" th:text="${resetUrl}">
                    重置链接
                </span>
            </p>
            
            <!-- Security Tips Section -->
            <div style="margin-top: 30px; padding: 15px; background-color: #fef5e7; border-left: 4px solid #f39c12; border-radius: 3px;">
                <p style="margin: 0; font-size: 14px;"><strong>安全提示：</strong></p>
                <ul style="margin: 10px 0; padding-left: 20px; font-size: 14px;">
                    <li>此链接将在<span th:text="${expirationMinutes}">30</span>分钟内有效</li>
                    <li>请勿将此链接分享给他人</li>
                    <li>请设置一个强密码以保护您的账户</li>
                    <li>如果您没有请求重置密码，请忽略此邮件，您的账户仍然安全</li>
                </ul>
            </div>
            
            <!-- Additional Note -->
            <div style="margin-top: 20px; padding: 15px; background-color: #e6fffa; border-left: 4px solid #38b2ac; border-radius: 3px;">
                <p style="margin: 0; font-size: 13px; color: #234e52;">
                    如果您怀疑账户存在安全问题或需要帮助，请立即联系我们的支持团队。
                </p>
            </div>
            
            <!-- Footer -->
            <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 30px 0;">
            <p style="color: #718096; font-size: 13px; margin-bottom: 5px;">此致，<br>凌清阁团队</p>
            <p style="color: #a0aec0; font-size: 12px;">
                <a th:href="'https://' + ${domain}" 
                   style="color: #4299e1; text-decoration: none;" 
                   th:text="${domain}"
                   aria-label="访问凌清阁网站">
                    domain.com
                </a>
            </p>
        </div>
    </div>
</body>
</html>
