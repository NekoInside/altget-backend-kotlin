spring:
  application:
    name: altget-backend-kotlin
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/altget?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: altget
    password: password
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 1

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: ltd.guimc.web.altget.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

captcha:
  geetest:
    id: your-geetest-id
    key: your-geetest-key
    api-server: https://gcaptcha4.geetest.com/validate

mail:
  from: noreply@example.com
  domain: example.com
  default-expiration-minutes: 30

resend:
  # Leave api-key blank to disable Resend and use SMTP (above) for all emails.
  # When set, each template below with a non-empty `id` is sent via Resend using
  # the remote template instead of rendering the local Thymeleaf HTML.
  api-key: ""
  api-base-url: https://api.resend.com
  from: ""            # blank -> falls back to mail.from
  templates:
    activation:
      id: ""          # e.g. "tmpl_xxx"; blank keeps SMTP for this template
      variables:      # internal field name -> Resend template variable name
        username: USERNAME
        activationUrl: ACTIVATION_URL
        expirationMinutes: EXPIRATION_MINUTES
    password-reset:
      id: ""
      variables:
        username: USERNAME
        resetUrl: RESET_URL
        expirationMinutes: EXPIRATION_MINUTES

oxapay:
  merchant-api-key: ${OXAPAY_MERCHANT_API_KEY:}
  api-base-url: https://api.oxapay.com/v1
  callback-url: ${OXAPAY_CALLBACK_URL:}
  return-url: ${OXAPAY_RETURN_URL:}
  invoice-lifetime-minutes: 60
  sandbox: ${OXAPAY_SANDBOX:false}
  timeout-millis: 10000

cookie-convert:
  upstream-url: ${COOKIE_CONVERT_UPSTREAM_URL:}
  timeout-millis: 10000

jwt:
  secret: your-jwt-secret-key-here-at-least-256-bits
  issuer: altget
  access-token-expiration: 7d
  register-verify-token-expiration: 10m

site:
  coin-buy-url: https://example.com/buy
  domain: localhost:8080
  fake-account-salt: default_salt_value
  srp-session-ttl: 60
  github-client-id: ""
  github-client-secret: ""
  discord-client-id: ""
  discord-client-secret: ""
  discord-bot-token: ""
  discord-channel-id: ""
  discord-channel-sponsor-role-id: ""

webauthn:
  rp-id: localhost
  rp-name: Altget
