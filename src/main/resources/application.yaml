spring:
  application:
    name: altget-backend-kotlin
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/altget?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: altget
    password: password
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  mail:
    host: smtp.example.com
    port: 587
    username: your-email@example.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: ltd.guimc.web.altget.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

captcha:
  geetest:
    id: your-geetest-id
    key: your-geetest-key
    api-server: https://gcaptcha4.geetest.com/validate

mail:
  from: noreply@example.com
  domain: example.com
  default-expiration-minutes: 30

jwt:
  secret: your-jwt-secret-key-here-at-least-256-bits
  issuer: altget
  access-token-expiration: 7d
  register-verify-token-expiration: 10m

site:
  coin-buy-url: https://example.com/buy
  domain: localhost:8080
  fake-account-salt: default_salt_value
  srp-session-ttl: 60